name: Build & Deploy to Cloudways

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Cloudways via SFTP
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CLOUDWAYS_SSH_KEY }}
          SFTP_HOST: ${{ secrets.CLOUDWAYS_HOST }}
          SFTP_USER: ${{ secrets.CLOUDWAYS_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Generate sftp batch commands
          {
            find dist -mindepth 1 -type d | sort | while IFS= read -r d; do
              echo "-mkdir ${d#dist/}"
            done
            find dist -type f | sort | while IFS= read -r f; do
              echo "put $f ${f#dist/}"
            done
            echo "bye"
          } > /tmp/sftp_batch.txt

          sftp -i ~/.ssh/deploy_key \
               -o StrictHostKeyChecking=no \
               -o LogLevel=ERROR \
               -b /tmp/sftp_batch.txt \
               "${SFTP_USER}@${SFTP_HOST}:/public_html"
