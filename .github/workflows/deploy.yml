name: Build & Deploy to Cloudways

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Cloudways via SFTP
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CLOUDWAYS_SSH_KEY }}
          SFTP_HOST: ${{ secrets.CLOUDWAYS_HOST }}
          SFTP_USER: ${{ secrets.CLOUDWAYS_USERNAME }}
        run: |
          pip install paramiko -q

          printf '%s\n' "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          python3 << 'PYEOF'
          import paramiko, os
          from pathlib import Path

          def upload_dir(sftp, local, remote):
              for item in sorted(Path(local).iterdir()):
                  rpath = remote + '/' + item.name
                  if item.is_dir():
                      try: sftp.mkdir(rpath)
                      except: pass
                      upload_dir(sftp, item, rpath)
                  else:
                      print(f'  {item} -> {rpath}')
                      sftp.put(str(item), rpath)

          key = paramiko.RSAKey.from_private_key_file('/tmp/deploy_key')
          ssh = paramiko.SSHClient()
          ssh.set_missing_host_key_policy(paramiko.AutoAddPolicy())
          ssh.connect(os.environ['SFTP_HOST'], username=os.environ['SFTP_USER'], pkey=key, timeout=30)
          sftp = ssh.open_sftp()
          upload_dir(sftp, 'dist', '/public_html')
          sftp.close()
          ssh.close()
          print('Deploy complete!')
          PYEOF
