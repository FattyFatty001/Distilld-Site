name: Build & Deploy to Cloudways

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Cloudways via SFTP
        env:
          SFTP_HOST: ${{ secrets.CLOUDWAYS_HOST }}
          SFTP_USER: ${{ secrets.CLOUDWAYS_USERNAME }}
          SFTP_PASS: ${{ secrets.CLOUDWAYS_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass -q

          # Generate sftp batch commands
          {
            find dist -mindepth 1 -type d | sort | while IFS= read -r d; do
              echo "-mkdir ${d#dist/}"
            done
            find dist -type f | sort | while IFS= read -r f; do
              echo "put $f ${f#dist/}"
            done
            echo "bye"
          } > /tmp/sftp_batch.txt

          # Strip any accidental whitespace from the password secret
          CLEAN_PASS=$(printf '%s' "$SFTP_PASS" | tr -d '\n\r ')
          echo "Password length after clean: ${#CLEAN_PASS}"

          # Use SSHPASS env var to avoid shell quoting issues with special chars
          export SSHPASS="$CLEAN_PASS"

          sshpass -e sftp -v \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PasswordAuthentication=yes \
            -o PubkeyAuthentication=no \
            -b /tmp/sftp_batch.txt \
            "${SFTP_USER}@${SFTP_HOST}:/public_html"
