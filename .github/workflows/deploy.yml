name: Build & Deploy to Cloudways

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Cloudways via SFTP
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CLOUDWAYS_SSH_KEY }}
          CLOUDWAYS_HOST: ${{ secrets.CLOUDWAYS_HOST }}
          CLOUDWAYS_USERNAME: ${{ secrets.CLOUDWAYS_USERNAME }}
        run: |
          sudo apt-get install -y lftp -q

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$CLOUDWAYS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Load key into SSH agent so lftp's built-in SSH picks it up
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/deploy_key

          lftp -e "set net:timeout 30; set net:max-retries 3; mirror -R --parallel=4 ./dist/ /public_html/; quit" \
            "sftp://${CLOUDWAYS_USERNAME}@${CLOUDWAYS_HOST}"
